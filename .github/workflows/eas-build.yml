name: EAS Build

on:
  push:
    branches:
      - copilot/vscode-moa9p7zs-111u
      - copilot/add-eas-build-configuration
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - copilot/vscode-moa9p7zs-111u

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (iOS preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.3.0
        with:
          node-version: 20

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@b5e527be8f7bae0ef02e1db1ef6626b9de5fedb5 # v8.0.0
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install native dependencies
        working-directory: native
        run: npm install

      - name: Run EAS Build (iOS preview, non-interactive)
        working-directory: native
        run: eas build --platform ios --profile preview --non-interactive
